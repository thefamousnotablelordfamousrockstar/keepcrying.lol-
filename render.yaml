services:
  - type: web
    name: keepcrying-lol
    env: node
    plan: free
    buildCommand: |
      npm install -g pnpm &&
      pnpm install &&
      BASE_PATH=/ PORT=3000 pnpm --filter @workspace/discord-profile run build &&
      pnpm --filter @workspace/api-server run build
    startCommand: NODE_ENV=production pnpm --filter @workspace/api-server run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: keepcrying-db
          property: connectionString
      - key: ADMIN_PASSWORD
        generateValue: false

databases:
  - name: keepcrying-db
    databaseName: keepcrying
    user: keepcrying
    plan: free
